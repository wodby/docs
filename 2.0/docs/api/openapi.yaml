openapi: 3.0.3
info:
  title: Wodby 2.0 Public API
  version: 1.0.0
  description: |
    Public REST API for customer SDKs and code integrations.
    GraphQL remains internal for the dashboard. This contract is the versioned public surface.
servers:
  - url: /v1
security:
  - apiKeyHeader: []
  - accessTokenHeader: []
tags:
  - name: orgs
  - name: projects
  - name: apps
  - name: app-instances
  - name: app-services
  - name: app-deployments
  - name: app-builds
  - name: clusters
  - name: databases
  - name: integrations
  - name: integration-kinds
  - name: providers
  - name: services
  - name: stacks
  - name: backups
  - name: imports
  - name: tasks
  - name: task-steps
  - name: app-routes
  - name: envs
paths:
  /openapi.yaml:
    get:
      summary: Get OpenAPI YAML
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /openapi.json:
    get:
      summary: Get OpenAPI JSON
      security: []
      responses:
        '200':
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
  /orgs:
    get:
      tags:
        - orgs
      summary: List orgs
      responses:
        '200':
          description: List of orgs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
    post:
      tags:
        - orgs
      summary: Create org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgRequest'
      responses:
        '201':
          description: Created org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
  /orgs/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags:
        - orgs
      summary: Update org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgRequest'
      responses:
        '200':
          description: Updated org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
    delete:
      tags:
        - orgs
      summary: Delete org
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /projects:
    get:
      tags:
        - projects
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags:
        - projects
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProjectInput'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /projects/by-name/{name}:
    get:
      tags:
        - projects
      summary: Get project by name
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags:
        - projects
      summary: Update project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      tags:
        - projects
      summary: Delete project
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /apps:
    get:
      tags:
        - apps
      summary: List apps
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/ClusterApp'
      responses:
        '200':
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
    post:
      tags:
        - apps
      summary: Create app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppInput'
      responses:
        '201':
          description: Created app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
  /apps/by-name/{name}:
    get:
      tags:
        - apps
      summary: Get app by name
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
  /apps/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - apps
      summary: Get app
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
    put:
      tags:
        - apps
      summary: Update app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTitleRequest'
      responses:
        '200':
          description: Updated app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
    delete:
      tags:
        - apps
      summary: Delete app
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /app-instances:
    get:
      tags:
        - app-instances
      summary: List app instances
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/ClusterId'
        - $ref: '#/components/parameters/ClusterAppOptional'
      responses:
        '200':
          description: List of app instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppInstance'
    post:
      tags:
        - app-instances
      summary: Create app instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppInstanceInput'
      responses:
        '201':
          description: Created app instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
  /app-instances/by-name/{appName}/{instanceName}:
    get:
      tags:
        - app-instances
      summary: Get app instance by app and instance name
      parameters:
        - name: appName
          in: path
          required: true
          schema:
            type: string
        - name: instanceName
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: App instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
  /app-instances/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-instances
      summary: Get app instance
      responses:
        '200':
          description: App instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
    put:
      tags:
        - app-instances
      summary: Update app instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTitleRequest'
      responses:
        '200':
          description: Updated app instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
    delete:
      tags:
        - app-instances
      summary: Delete app instance
      parameters:
        - $ref: '#/components/parameters/Force'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /app-services:
    get:
      tags:
        - app-services
      summary: List app services
      parameters:
        - $ref: '#/components/parameters/AppInstanceId'
      responses:
        '200':
          description: List of app services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppService'
  /app-services/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-services
      summary: Get app service
      responses:
        '200':
          description: App service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppService'
    put:
      tags:
        - app-services
      summary: Update app service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppServiceInput'
      responses:
        '200':
          description: Updated app service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppService'
  /app-services/{id}/actions/{name}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/Name'
    post:
      tags:
        - app-services
      summary: Run app service action
      responses:
        '201':
          description: Action task result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /app-deployments:
    get:
      tags:
        - app-deployments
      summary: List app deployments
      parameters:
        - $ref: '#/components/parameters/AppInstanceId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
