components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
    accessTokenHeader:
      type: apiKey
      in: header
      name: X-ACCESS-TOKEN
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Name:
      name: name
      in: path
      required: true
      schema:
        type: string
    OrgId:
      name: orgId
      in: query
      required: true
      schema:
        type: integer
    OrgIdOptional:
      name: orgId
      in: query
      schema:
        type: integer
    ProjectIds:
      name: projectIds
      in: query
      schema:
        type: string
      description: Comma-separated project ids
    Search:
      name: search
      in: query
      schema:
        type: string
    RevNumber:
      name: revNumber
      in: query
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
      description: Page number, defaults to 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
      description: Page size, defaults to 30
    ClusterApp:
      name: clusterApp
      in: query
      schema:
        type: boolean
    ClusterAppOptional:
      name: clusterApp
      in: query
      schema:
        type: boolean
    AppId:
      name: appId
      in: query
      schema:
        type: integer
