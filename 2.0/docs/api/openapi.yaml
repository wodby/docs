          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
  /databases:
    get:
      tags:
        - databases
      summary: List databases
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - name: kind
          in: query
