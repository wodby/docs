      in: query
      required: true
      schema:
        type: string
    Location:
      name: location
      in: query
      required: true
      schema:
        type: string
    DbType:
      name: dbType
      in: query
      required: true
      schema:
        type: string
    DatabaseVersion:
      name: version
      in: query
      required: true
      schema:
        type: string
    HighAvailability:
      name: ha
