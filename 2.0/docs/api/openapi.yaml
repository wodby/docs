openapi: 3.0.3
info:
  title: Wodby 2 Public API
  version: 1.0.0
  termsOfService: https://wodby.com/legal
  license:
    name: Proprietary
    url: https://wodby.com/legal
  description: |
    Public REST API for customer SDKs and code integrations.
    GraphQL remains internal for the dashboard. This contract is the versioned public surface.
servers:
  - url: /v1
security:
  - apiKeyHeader: []
tags:
  - name: orgs
    description: Organizations that own projects, resources, and access scopes.
  - name: projects
    description: Project containers within organizations.
  - name: apps
    description: Applications and app-level configuration.
  - name: app-instances
    description: Deployable application instances.
  - name: app-services
    description: Runtime services that belong to app instances.
  - name: app-deployments
    description: Deployment records and deployment actions.
  - name: app-builds
    description: Build records and CI build ingestion.
  - name: clusters
    description: Kubernetes clusters connected to or managed by Wodby.
  - name: databases
    description: Database instances managed through provider integrations.
  - name: integrations
    description: Connected provider accounts and credentials.
  - name: integration-kinds
    description: Provider capability metadata and option lists.
  - name: providers
    description: Provider catalog entries and revisions.
  - name: services
    description: Service catalog entries and service options.
  - name: stacks
    description: Stack catalog entries and stack revisions.
  - name: backups
    description: Backup records and backup creation.
  - name: imports
    description: Import records and import creation.
  - name: tasks
    description: User-visible task records and task actions.
  - name: task-steps
    description: Task step logs and log URLs.
  - name: app-routes
    description: HTTP routing rules for app instances.
  - name: envs
    description: Organization-level environment definitions.
paths:
  /openapi.yaml:
    get:
      summary: Get OpenAPI YAML
      operationId: getOpenApiYaml
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /openapi.json:
    get:
      summary: Get OpenAPI JSON
      operationId: getOpenApiJson
      security: []
      responses:
        '200':
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /orgs:
    get:
      tags:
        - orgs
      summary: List orgs
      operationId: listOrgs
      responses:
        '200':
          description: List of orgs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /orgs/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - orgs
      summary: Get org
      operationId: getOrg
      responses:
        '200':
          description: Org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - orgs
      summary: Update org
      operationId: updateOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgRequest'
      responses:
        '200':
          description: Updated org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - orgs
      summary: Delete org
      operationId: deleteOrg
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects:
    get:
      tags:
        - projects
      summary: List projects
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - projects
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProjectInput'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/by-name/{name}:
    get:
      tags:
        - projects
      summary: Get project by name
      operationId: getProjectByName
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - projects
      summary: Get project
      operationId: getProject
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - projects
      summary: Update project
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - projects
      summary: Delete project
      operationId: deleteProject
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps:
    get:
      tags:
        - apps
      summary: List apps
      operationId: listApps
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/ClusterApp'
      responses:
        '200':
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - apps
      summary: Create app
      operationId: createApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppInput'
      responses:
        '201':
          description: Created app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps/by-name/{name}:
    get:
      tags:
        - apps
      summary: Get app by name
      operationId: getAppByName
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - apps
      summary: Get app
      operationId: getApp
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
