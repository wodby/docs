            type: string
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Database'
    post:
      tags:
        - databases
      summary: Create database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewDatabaseInput'
      responses:
        '201':
          description: Created database
          content:
            application/json:
              schema:
