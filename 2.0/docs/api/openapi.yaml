      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentFromCIInput'
      responses:
        '201':
          description: Created deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppDeployment'
  /app-deployments/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-deployments
      summary: Get deployment
      responses:
        '200':
          description: Deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppDeployment'
  /app-deployments/{id}/redeploy:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags:
        - app-deployments
      summary: Redeploy deployment
      responses:
        '201':
          description: Created deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppDeployment'
  /app-builds:
    get:
      tags:
