      required:
        - id
        - name
        - title
        - orgId
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: string
        orgId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    App:
