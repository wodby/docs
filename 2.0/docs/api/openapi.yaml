openapi: 3.0.3
info:
  title: Wodby 2 Public API
  version: 1.0.0
  termsOfService: https://wodby.com/legal
  license:
    name: Proprietary
    url: https://wodby.com/legal
  description: |
    Public REST API for customer SDKs and code integrations.
    GraphQL remains internal for the dashboard. This contract is the versioned public surface.
servers:
  - url: /v1
security:
  - apiKeyHeader: []
tags:
  - name: user
    description: Authenticated user account profile.
  - name: orgs
    description: Organizations that own projects, resources, and access scopes.
  - name: org-memberships
    description: Organization users, invitations, roles, and membership status.
  - name: projects
    description: Project containers within organizations.
  - name: apps
    description: Applications and app-level configuration.
  - name: app-instances
    description: Deployable application instances.
  - name: app-services
    description: Runtime services that belong to app instances.
  - name: app-deployments
    description: Deployment records and deployment actions.
  - name: app-builds
    description: Build records and CI build ingestion.
  - name: app-ports
    description: Network ports exposed by app services and app endpoints.
  - name: app-routes
    description: HTTP routing rules for app instances.
  - name: certs
    description: TLS certificate metadata for routes, app services, app instances, and databases.
  - name: clusters
    description: Kubernetes clusters connected to or managed by Wodby.
  - name: databases
    description: Database instances managed through provider integrations.
  - name: integrations
    description: Connected provider accounts and credentials.
  - name: integration-kinds
    description: Provider capability metadata and option lists.
  - name: providers
    description: Provider catalog entries and revisions.
  - name: services
    description: Service catalog entries and service options.
  - name: stacks
    description: Stack catalog entries and stack revisions.
  - name: stack-services
    description: Stack service definitions and stack-service actions.
  - name: backups
    description: Backup records and backup creation.
  - name: imports
    description: Import records and import creation.
  - name: tasks
    description: User-visible task records and task actions.
  - name: task-steps
    description: Task step logs and log URLs.
  - name: envs
    description: Organization-level environment definitions.
paths:
  /openapi.yaml:
    get:
      summary: Get OpenAPI YAML
      description: Returns the public OpenAPI schema in YAML format.
      operationId: getOpenApiYaml
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /openapi.json:
    get:
      summary: Get OpenAPI JSON
      description: Returns the public OpenAPI schema in JSON format.
      operationId: getOpenApiJson
      security: []
      responses:
        '200':
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /user:
    get:
      tags:
        - user
      summary: Get current user
      description: Returns the authenticated user account.
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - user
      summary: Update current user
      description: Updates the authenticated user's basic profile and returns the updated account.
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
      responses:
        '200':
          description: Updated current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /orgs:
    get:
      tags:
        - orgs
      summary: List orgs
      description: Returns orgs matching the request filters.
      operationId: listOrgs
      responses:
        '200':
          description: List of orgs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /orgs/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - orgs
      summary: Get org
      description: Returns the org identified by the request path.
      operationId: getOrg
      responses:
        '200':
          description: Org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - orgs
      summary: Update org
      description: Updates the org and returns the updated resource.
      operationId: updateOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgRequest'
      responses:
        '200':
          description: Updated org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /org-memberships:
    get:
      tags:
        - org-memberships
      summary: List org memberships
      description: Returns org memberships matching the request filters.
      operationId: listOrgMemberships
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: List of org memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrgMembership'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /org-memberships/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - org-memberships
      summary: Get org membership
      description: Returns the org membership identified by the request path.
      operationId: getOrgMembership
      responses:
        '200':
          description: Org membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgMembership'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects:
    get:
      tags:
        - projects
      summary: List projects
      description: Returns projects matching the request filters.
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - projects
      summary: Create project
      description: Creates a project and returns the created resource.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProjectInput'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/by-name/{name}:
    get:
      tags:
        - projects
      summary: Get project by name
      description: Returns the project identified by name.
      operationId: getProjectByName
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - projects
      summary: Get project
      description: Returns the project identified by the request path.
      operationId: getProject
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - projects
      summary: Update project
      description: Updates the project and returns the updated resource.
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - projects
      summary: Delete project
      description: Deletes the project and returns the operation result.
      operationId: deleteProject
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps:
    get:
      tags:
        - apps
      summary: List apps
      description: Returns apps matching the request filters.
      operationId: listApps
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/ClusterApp'
      responses:
        '200':
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - apps
      summary: Create app
      description: Creates an app and returns the created resource.
      operationId: createApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppInput'
      responses:
        '201':
          description: Created app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps/by-name/{name}:
    get:
      tags:
        - apps
      summary: Get app by name
      description: Returns the app identified by name.
      operationId: getAppByName
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /apps/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - apps
      summary: Get app
      description: Returns the app identified by the request path.
      operationId: getApp
      responses:
        '200':
          description: App
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - apps
      summary: Update app
      description: Updates the app and returns the updated resource.
      operationId: updateApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTitleRequest'
      responses:
        '200':
          description: Updated app
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - apps
      summary: Delete app
      description: Deletes the app and returns the operation result.
      operationId: deleteApp
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-instances:
    get:
      tags:
        - app-instances
      summary: List app instances
      description: Returns app instances matching the request filters.
      operationId: listAppInstances
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/AppId'
        - $ref: '#/components/parameters/ClusterId'
        - $ref: '#/components/parameters/ClusterAppOptional'
      responses:
        '200':
          description: List of app instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - app-instances
      summary: Create app instance
      description: Creates an app instance and returns the created resource.
      operationId: createAppInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppInstanceInput'
      responses:
        '201':
          description: Created app instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-instances/by-name/{appName}/{instanceName}:
    get:
      tags:
        - app-instances
      summary: Get app instance by app and instance name
      description: Returns the app instance identified by app and instance name.
      operationId: getAppInstanceByName
      parameters:
        - name: appName
          in: path
          required: true
          schema:
            type: string
        - name: instanceName
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/OrgId'
      responses:
        '200':
          description: App instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-instances/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-instances
      summary: Get app instance
      description: Returns the app instance identified by the request path.
      operationId: getAppInstance
      responses:
        '200':
          description: App instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - app-instances
      summary: Update app instance
      description: Updates the app instance and returns the updated resource.
      operationId: updateAppInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTitleRequest'
      responses:
        '200':
          description: Updated app instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - app-instances
      summary: Delete app instance
      description: Deletes the app instance and returns the operation result.
      operationId: deleteAppInstance
      parameters:
        - $ref: '#/components/parameters/Force'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-instances/settings/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags:
        - app-instances
      summary: Update app instance settings
      description: Updates app instance settings and returns the updated app instance.
      operationId: updateAppInstanceSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstanceSettingsInput'
      responses:
        '200':
          description: Updated app instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppInstance'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-instances/{id}/actions/upgrade-stack:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags:
        - app-instances
      summary: Upgrade app instance stack
      description: Upgrades an app instance stack using the selected upgrade sections.
      operationId: upgradeAppInstanceStack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppInstanceStackUpgradeInput'
      responses:
        '200':
          description: Upgrade result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services:
    get:
      tags:
        - app-services
      summary: List app services
      description: Returns app services matching the request filters.
      operationId: listAppServices
      parameters:
        - $ref: '#/components/parameters/AppInstanceId'
      responses:
        '200':
          description: List of app services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppService'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-services
      summary: Get app service
      description: Returns the app service identified by the request path.
      operationId: getAppService
      responses:
        '200':
          description: App service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppService'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - app-services
      summary: Update app service
      description: Updates the app service and returns the updated resource.
      operationId: updateAppService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppServiceInput'
      responses:
        '200':
          description: Updated app service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppService'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services/{id}/actions/{name}:
    parameters:
      - $ref: '#/components/parameters/Id'
      - $ref: '#/components/parameters/Name'
    post:
      tags:
        - app-services
      summary: Run app service action
      description: Runs the named action for an app service.
      operationId: runAppServiceAction
      responses:
        '201':
          description: Action task result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services/{id}/log-streams:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags:
        - app-services
      summary: Create app service log stream
      description: Creates a log stream for an app service container and returns the stream id.
      operationId: createAppServiceLogStream
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppServiceLogStreamInput'
      responses:
        '201':
          description: Created log stream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogStream'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services/{id}/env-vars:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-services
      summary: List app service env vars
      description: Returns environment variables configured for an app service.
      operationId: listAppServiceEnvVars
      responses:
        '200':
          description: List of app service env vars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppServiceEnvVar'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - app-services
      summary: Create app service env var
      description: Creates an environment variable for an app service.
      operationId: createAppServiceEnvVar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewAppServiceEnvVarInput'
      responses:
        '201':
          description: Created app service env var
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceEnvVar'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-service-env-vars/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags:
        - app-services
      summary: Update app service env var
      description: Updates an app service environment variable.
      operationId: updateAppServiceEnvVar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppServiceEnvVarInput'
      responses:
        '200':
          description: Updated app service env var
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceEnvVar'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - app-services
      summary: Delete app service env var
      description: Deletes an app service environment variable.
      operationId: deleteAppServiceEnvVar
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-services/{id}/helm-values:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-services
      summary: List app service Helm values
      description: Returns Helm values configured for an app service.
      operationId: listAppServiceHelmValues
      responses:
        '200':
          description: List of app service Helm values
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppServiceHelmValue'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - app-services
      summary: Create app service Helm value
      description: Creates a Helm value override for an app service.
      operationId: createAppServiceHelmValue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamedSecretValueInput'
      responses:
        '201':
          description: Created app service Helm value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceHelmValue'
        default:
          $ref: '#/components/responses/Error'
        4XX:
          $ref: '#/components/responses/Error'
  /app-service-helm-values/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    put:
      tags:
        - app-services
      summary: Update app service Helm value
      description: Updates an app service Helm value override.
      operationId: updateAppServiceHelmValue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecretValueInput'
