      name: clusterId
      in: query
      schema:
        type: integer
    Force:
      name: force
      in: query
      schema:
        type: boolean
        default: false
    IntegrationId:
      name: integrationId
      in: query
      schema:
        type: integer
    IntegrationIdOptional:
      name: integrationId
      in: query
      schema:
        type: integer
    ServiceIdOptional:
      name: serviceId
      in: query
      schema:
        type: integer
    RemoteGitRepoId:
