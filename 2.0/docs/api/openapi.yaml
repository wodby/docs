      name: appInstanceId
      in: query
      required: true
      schema:
        type: integer
    AppInstanceIdOptional:
      name: appInstanceId
      in: query
      schema:
        type: integer
    AppServiceIdOptional:
      name: appServiceId
      in: query
      schema:
        type: integer
    DatabaseIdOptional:
      name: databaseId
      in: query
      schema:
        type: integer
    DatabaseDbIdOptional:
      name: databaseDbId
      in: query
      schema:
        type: integer
