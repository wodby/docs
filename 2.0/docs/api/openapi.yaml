        - $ref: '#/components/parameters/Force'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        default:
          $ref: '#/components/responses/Error'
        4XX:
