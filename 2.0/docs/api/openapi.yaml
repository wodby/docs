components:
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
      description: Organization-scoped Wodby API key. Requests are restricted to the key's organization.
    ciAccessTokenHeader:
      type: apiKey
      in: header
      name: X-ACCESS-TOKEN
      description: Short-lived CI token generated by Wodby build workflows. Only operations that explicitly list this scheme accept it.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Name:
      name: name
      in: path
      required: true
      schema:
        type: string
    OrgId:
      name: orgId
      in: query
      required: false
      description: Optional for API-key requests; defaults to the API key's organization. If provided, it must match the key's organization.
      schema:
        type: integer
    OrgIdOptional:
      name: orgId
      in: query
      required: false
      description: Optional for API-key requests; defaults to the API key's organization. If provided, it must match the key's organization.
      schema:
        type: integer
    ProjectIds:
      name: projectIds
      in: query
      schema:
        type: string
      description: Comma-separated project ids
    Search:
      name: search
      in: query
      schema:
        type: string
    RevNumber:
      name: revNumber
      in: query
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
      description: Page number, defaults to 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
      description: Page size, defaults to 30
    ClusterApp:
      name: clusterApp
      in: query
      schema:
        type: boolean
    ClusterAppOptional:
      name: clusterApp
      in: query
      schema:
        type: boolean
    AppId:
      name: appId
      in: query
      schema:
        type: integer
    AppIdOptional:
      name: appId
      in: query
      schema:
        type: integer
    ClusterId:
      name: clusterId
      in: query
      schema:
        type: integer
    ClusterIdOptional:
      name: clusterId
      in: query
      schema:
        type: integer
    Force:
      name: force
      in: query
      schema:
        type: boolean
        default: false
    IntegrationId:
      name: integrationId
      in: query
      schema:
        type: integer
    IntegrationIdOptional:
      name: integrationId
      in: query
      schema:
        type: integer
    ServiceIdOptional:
      name: serviceId
      in: query
      schema:
        type: integer
    RemoteGitRepoId:
      name: remoteGitRepoId
      in: query
      required: true
      schema:
        type: string
    Location:
      name: location
      in: query
      required: true
      schema:
        type: string
    DbType:
      name: dbType
      in: query
      required: true
      schema:
        type: string
    DatabaseVersion:
      name: version
      in: query
      required: true
      schema:
        type: string
    HighAvailability:
      name: ha
      in: query
      schema:
        type: boolean
        default: false
    AppInstanceId:
      name: appInstanceId
      in: query
      required: true
      schema:
        type: integer
    AppInstanceIdOptional:
      name: appInstanceId
      in: query
      schema:
        type: integer
    AppServiceIdOptional:
      name: appServiceId
      in: query
      schema:
        type: integer
    DatabaseIdOptional:
      name: databaseId
      in: query
      schema:
        type: integer
    DatabaseDbIdOptional:
      name: databaseDbId
      in: query
      schema:
        type: integer
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    OperationResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        taskId:
          type: integer
          nullable: true
    Org:
      type: object
      required:
        - id
        - name
        - title
        - domain
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: string
        domain:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Project:
