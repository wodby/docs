        '200':
          description: List of builds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppBuildsResponse'
    post:
      tags:
        - app-builds
      summary: Create build
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildRequest'
      responses:
        '201':
          description: Created build list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppBuild'
  /app-builds/from-ci:
    post:
      tags:
        - app-builds
      summary: Create build from CI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBuildFromCIInput'
      responses:
        '201':
          description: Created build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppBuild'
  /app-builds/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-builds
      summary: Get build
      responses:
        '200':
          description: Build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppBuild'
  /app-builds/{id}/docker-registry-credentials:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - app-builds
      summary: Get Docker registry credentials for build
      responses:
        '200':
          description: Docker registry credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerRegistryCredentials'
  /app-builds/{id}/deploy:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags:
        - app-builds
      summary: Deploy build
      responses:
        '201':
          description: Created deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppDeployment'
  /app-builds/{id}/void:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags:
        - app-builds
      summary: Void build images
      responses:
        '200':
          description: Updated build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppBuild'
  /clusters:
    get:
      tags:
        - clusters
      summary: List clusters
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/ProjectIds'
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: List of clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cluster'
    post:
      tags:
        - clusters
      summary: Create cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewClusterInput'
      responses:
        '201':
          description: Created cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
  /clusters/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags:
        - clusters
      summary: Get cluster
      responses:
        '200':
          description: Cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
    put:
      tags:
        - clusters
      summary: Update cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTitleRequest'
      responses:
        '200':
          description: Updated cluster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
    delete:
